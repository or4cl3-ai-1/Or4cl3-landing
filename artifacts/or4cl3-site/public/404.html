<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Or4cl3 AI Solutions</title>
  <script>
    // GitHub Pages SPA redirect
    // When a direct URL is hit (e.g. a refresh or shared link), GitHub Pages
    // serves this 404.html. We encode the full path into a query string and
    // redirect to the root index.html, which then restores it via sessionStorage.
    var seg = 1; // number of path segments to preserve for the base path
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + seg).join('/') + '/?p=/' +
      l.pathname.slice(1).split('/').slice(seg).join('/').replace(/&/g, '~and~') +
      (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body>
  <p>Redirecting&hellip;</p>
</body>
</html>
